<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High Record — Jaden</title>

<style>
body {
  background-color: #ffffff;
  color: #000000;
  font-family: "Times New Roman", serif;
  margin: 0;
  padding: 60px;
}

.container {
  max-width: 750px;
  margin: 0 auto;
  border: 2px solid #000;
  padding: 50px;
}

h1 {
  text-align: center;
  margin-bottom: 50px;
  letter-spacing: 3px;
}

.record {
  margin-bottom: 22px;
  display: flex;
}

.label {
  width: 180px;
  font-weight: bold;
}

.value {
  flex: 1;
  border-bottom: 1px solid #000;
  padding-bottom: 4px;
}

.section-title {
  margin-top: 50px;
  margin-bottom: 20px;
  font-weight: bold;
  border-bottom: 1px solid #000;
  padding-bottom: 5px;
}

.note {
  line-height: 1.9;
}

.footer {
  margin-top: 70px;
  text-align: right;
  font-size: 14px;
}
</style>
</head>

<body>

<div class="container">

<h1>중앙 기록 문서</h1>

<div class="record">
  <div class="label">이름</div>
  <div class="value">제이든</div>
</div>

<div class="record">
  <div class="label">직위</div>
  <div class="value">교단 집행관</div>
</div>

<div class="record">
  <div class="label">지위 등급</div>
  <div class="value">Ⅰ — 핵심 인물</div>
</div>

<div class="record">
  <div class="label">권한 범위</div>
  <div class="value">교리 집행 및 해석 권한 보유</div>
</div>

<div class="record">
  <div class="label">신의 부름</div>
  <div class="value">확정됨</div>
</div>

<div class="section-title">비고</div>

<div class="note">
제이든은 교리의 해석자이자 집행자이다.  
그의 판단은 곧 교단의 판단이며,  
그의 침묵은 곧 명령이다.  

그의 이름은 기록되었고,  
그의 권위는 의심되지 않는다.
</div>

<div class="footer">
Ecclesia Obscura — Central Authority Archive
</div>

</div>

</body>
</html>
