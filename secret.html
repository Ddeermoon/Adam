<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>High Record — Jaden</title>

<style>
body {
  background-color: #000000;
  color: #8b0000; /* 어두운 붉은색 */

  margin: 0;
  padding: 60px;
}

.container {
  max-width: 750px;
  margin: 0 auto;
  border: 1px solid #8b0000;
  padding: 50px;
}

h1 {
  text-align: center;
  margin-bottom: 50px;
  letter-spacing: 3px;
  font-weight: normal;
}

.record {
  margin-bottom: 22px;
  display: flex;
}

.label {
  width: 180px;
  font-weight: bold;
}

.value {
  flex: 1;
  border-bottom: 1px solid #8b0000;
  padding-bottom: 4px;
}

.section-title {
  margin-top: 50px;
  margin-bottom: 20px;
  border-bottom: 1px solid #8b0000;
  padding-bottom: 5px;
}

.note {
  line-height: 1.9;
}

.footer {
  margin-top: 70px;
  text-align: right;
  font-size: 14px;
  opacity: 0.8;
}

</head>

<body>

<div class="container">

<h1>⯣ 기록 문서</h1>

<div class="record">

  <div class="value">아담 제이슨</div>
</div>

<div class="record">

</div>

<div class="record">

</div>

<div class="record">
  <div class="label">신의 부름</div>
  <div class="value">■■■</div>
</div>

<div class="section-title">비고</div>

<div class="note">
현재, 사망.
아담 제이든이 모든 권리를 양도 받음.

<div class="note">
사망 원인, 전쟁 중 
<span class="hover-word">카볼로

</span>
 군인이 교단을 습격.

<div class="footer">
⯣ ■■■■. 
</div>

</div>

</html>
