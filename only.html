<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Only</title>

<style>

body{
background:#ffffff;
margin:0;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-family:serif;
text-align:center;
}

/* 글씨 */
.title{
font-size:42px;
font-weight:bold;
color:#5a0000;
margin-bottom:40px;
animation:glitch 0.6s ease;
}

/* 흔들림 효과 */
@keyframes glitch{

0%{
opacity:0;
transform:translateX(-10px);
}

25%{
opacity:1;
transform:translateX(8px);
}

50%{
transform:translateX(-6px);
}

75%{
transform:translateX(4px);
}

100%{
transform:translateX(0);
}

}

/* 이미지 크게 (화면 기준) */

img{
width:80vw;
height:auto;
}

</style>

</head>

<body>

<div class="title">
아담 형제, 우리의 아버지시여.
</div>

<img src="adam_brothers.jpg">

</body>
</html>
