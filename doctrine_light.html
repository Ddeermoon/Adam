<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture I — Adam</title>

<style>
body {
  background-color: #000;
  color: #fff;
  font-family: "Times New Roman", serif;
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  text-align: center;
  line-height: 2.2;
  letter-spacing: 1.5px;
  animation: fadeIn 2.5s ease forwards;
  opacity: 0;
}

.container {
  max-width: 700px;
}

h1 {
  font-weight: normal;
  margin-bottom: 50px;
  letter-spacing: 3px;
}

.verse {
  margin-bottom: 25px;
}

.signature {
  margin-top: 60px;
  font-style: italic;
  opacity: 0.7;
}

@keyframes fadeIn {
  to { opacity: 1; }
}
</style>
</head>
<body>

<div class="container">

<h1>제 1 교리 — 아담</h1>

<div class="verse">
아담.<br>
신의 교리를 따르는 고귀한 존재.
</div>

<div class="verse">
하나의 운명을 두 개의 육체로 나눠가지니,<br>
신께서 한 명의 영혼을 구원하시라.
</div>

<div class="verse">
아담의 존재는 지독한 증오로부터,<br>
인간의 추잡한 욕망까지 이끄시나이.
</div>

<div class="verse">
아담의 이름 아래,<br>
모든 것이 허무할지어다.
</div>

<div class="signature">
— END
</div>

</div>

</body>
</html>
