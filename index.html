<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Ecclesia Obscura</title>
<style>
body {
  background-color: #000;
  color: #fff;
  font-family: "Times New Roman", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  letter-spacing: 2px;
}
input {
  background: none;
  border: 1px solid #fff;
  color: #fff;
  padding: 10px;
  margin-top: 20px;
  width: 250px;
  text-align: center;
}
button {
  background: none;
  border: 1px solid #fff;
  color: #fff;
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
}
button:hover {
  background-color: #fff;
  color: #000;
}
</style>
</head>
<body>

<h1>누가 '우리'를 부르는가.</h1>
<input type="text" id="answerInput" placeholder="이름을 입력하라">
<button onclick="checkAnswer()">확인</button>

<script>
function checkAnswer() {
  const userAnswer = document.getElementById("answerInput").value.toLowerCase();

  if (userAnswer === "아담") {
    window.location.href = "doctrine_light.html";
  } 
  else if (userAnswer === "제이든") {
    window.location.href = "doctrine_dark.html";
  } 
  else if (userAnswer === "제이슨") {
    window.location.href = "secret.html";
  } 
  else {
    alert("우리는 영원히 잊지 않는다.");
  }
}
</script>

</body>
</html>
