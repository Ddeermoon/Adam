<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecclesia Obscura</title>

<style>
body {
  background-color: #000;
  color: #fff;
  font-family: "Times New Roman", serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  flex-direction: column;
  letter-spacing: 2px;
  margin: 0;
  transition: opacity 1s ease;
  position: relative;
  overflow: hidden;
}

h1 {
  font-weight: normal;
  z-index: 2;
}

input {
  background: none;
  border: 1px solid #fff;
  color: #fff;
  padding: 10px;
  margin-top: 20px;
  width: 250px;
  text-align: center;
  outline: none;
  z-index: 2;
}

button {
  background: none;
  border: 1px solid #fff;
  color: #fff;
  padding: 10px 20px;
  margin-top: 10px;
  cursor: pointer;
  transition: 0.3s;
  z-index: 2;
}

button:hover {
  background-color: #fff;
  color: #000;
}

.fade-out {
  opacity: 0;
}

/* 🔴 붉은 번쩍 효과 */
.flash {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: red;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 9999;
}
.flash.active {
  opacity: 0.4;
}

/* 🩸 붉은 십자가 파티클 */
.particle {
  position: fixed;
  color: rgba(139, 0, 0, 0.4);
  font-size: 18px;
  pointer-events: none;
  animation: float linear infinite;
  z-index: 1;
}

@keyframes float {
  from {
    transform: translateY(100vh) rotate(0deg);
  }
  to {
    transform: translateY(-10vh) rotate(360deg);
  }
}
</style>
</head>

<body>

<div id="flash" class="flash"></div>

<h1>누가 '우리'를 부르는가.</h1>

<input type="text" id="answerInput" placeholder="이름을 입력하라">
<button onclick="checkAnswer()">확인</button>

<script>
function checkAnswer() {
  const userAnswer = document
    .getElementById("answerInput")
    .value
    .trim();

  if (userAnswer === "아담") {
    redFlash("doctrine_light.html");
  } 
  else if (userAnswer === "제이든") {
    movePage("doctrine_dark.html");
  } 
  else if (userAnswer === "제이슨") {
    movePage("secret.html");
  } 
  else if (userAnswer === "프로필") {
  movePage("profile.html");
  }
  else if (userAnswer === "아담교") {
  movePage("amusement.html");
  }  
  else {
    alert("우리는 영원히 잊지 않는다.");
  }
}

function redFlash(page) {
  const flash = document.getElementById("flash");
  flash.classList.add("active");

  setTimeout(() => {
    flash.classList.remove("active");
    document.body.classList.add("fade-out");

    setTimeout(() => {
      window.location.href = page;
    }, 800);

  }, 200);
}

function movePage(page) {
  document.body.classList.add("fade-out");
  setTimeout(() => {
    window.location.href = page;
  }, 800);
}

// Enter 키 제출
document.getElementById("answerInput")
  .addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      checkAnswer();
    }
});

// 🩸 붉은 십자가 생성
function createParticle() {
  const particle = document.createElement("div");
  particle.classList.add("particle");
  particle.innerText = "✝";

  particle.style.left = Math.random() * 100 + "vw";
  particle.style.fontSize = (12 + Math.random() * 20) + "px";
  particle.style.animationDuration = (5 + Math.random() * 10) + "s";
  particle.style.opacity = 0.2 + Math.random() * 0.5;

  document.body.appendChild(particle);

  setTimeout(() => {
    particle.remove();
  }, 15000);
}

setInterval(createParticle, 800);
</script>

</body>
</html>
